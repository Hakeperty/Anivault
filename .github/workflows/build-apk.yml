name: Build AniVault APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: 30,31,32,33,34
        build-tools-version: 34.0.0
    
    - name: Install npm dependencies
      run: npm install
    
    - name: Sync Capacitor
      run: npx cap sync
    
    - name: Build debug APK
      run: cd android && ./gradlew assembleDebug
    
    - name: Build release APK
      run: cd android && ./gradlew assembleRelease
    
    - name: Get APK filenames
      id: apk_files
      run: |
        DEBUG_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
        RELEASE_APK=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -1)
        echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
        echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
        echo "Debug APK: $DEBUG_APK"
        echo "Release APK: $RELEASE_APK"
    
    - name: Upload debug APK as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: anivault-debug
        path: ${{ steps.apk_files.outputs.debug_apk }}
        retention-days: 30
    
    - name: Upload release APK as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: anivault-release
        path: ${{ steps.apk_files.outputs.release_apk }}
        retention-days: 30
    
    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ steps.apk_files.outputs.debug_apk }}
          ${{ steps.apk_files.outputs.release_apk }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Comment on PR with APK links
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Build complete! APK artifacts available:\n\n- **Debug APK**: Download from Actions artifacts\n- **Release APK**: Download from Actions artifacts'
          })

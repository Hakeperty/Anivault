<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AniVault</title>
    <link rel="stylesheet" href="styles/global.css">
</head>
<body>
    <div id="app">
        <div id="screen-container"></div>
        <nav id="bottom-nav">
            <button class="nav-btn active" data-screen="library">
                <span class="nav-icon">📚</span>
                <span class="nav-label">Library</span>
            </button>
            <button class="nav-btn" data-screen="search">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Search</span>
            </button>
            <button class="nav-btn" data-screen="downloads">
                <span class="nav-icon">⬇️</span>
                <span class="nav-label">Downloads</span>
            </button>
            <button class="nav-btn" data-screen="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </button>
        </nav>
    </div>
    <div id="toast"></div>
    <script type="module" src="main.js"></script>
</body>
</html>
